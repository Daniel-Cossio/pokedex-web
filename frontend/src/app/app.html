<nav class="navbar glass-panel">
  <div class="logo">
    <span (click)="irAHome()" style="cursor:pointer">🔴</span>
    <h1 (click)="irAHome()" style="cursor:pointer">Pokédex <span class="highlight">Pro</span></h1>
  </div>
  <div class="nav-links">
    <a routerLink="/" class="nav-link">Inicio</a>
    <a routerLink="/tipos" class="nav-link">Tabla de Tipos</a>
  </div>
  <div class="search-container">
    <div class="search-wrapper">
      <input
        type="text"
        id="search-input"
        [ngModel]="busqueda()"
        (ngModelChange)="busqueda.set($event)"
        (keydown.enter)="buscar()"
        (focus)="onInputFocus()"
        (blur)="onInputBlur()"
        placeholder="Busca un Pokémon (ej: pikachu, 25)..."
        class="search-input"
        autocomplete="off">
        
      @if (showSuggestions() && filteredSuggestions().length > 0) {
        <div class="suggestions-box glass-panel fade-in">
          @for (s of filteredSuggestions(); track s.id) {
            <div class="suggestion-item" (click)="navegar(s.id)">
              <span class="s-name">{{ s.nombre }}</span>
              <span class="s-id">#{{ s.id }}</span>
            </div>
          }
        </div>
      }
    </div>
    <button (click)="buscar()" class="search-button">Buscar</button>
  </div>
</nav>

<main class="router-container">
  <router-outlet></router-outlet>
</main>

<footer class="footer glass-panel">
  <div class="footer-content">
    <p><span class="highlight">Pokédex Pro</span> <span class="version">v1.0.0-PRO</span></p>
    <p class="credits">© 2026 • Enciclopedia Maestra Pokémon • <span class="status">Live</span></p>
  </div>
</footer>
